name: Build and Test on PR

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Jekyll Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install dependencies
        run: bundle install
      - name: Build site
        run: bundle exec jekyll build
